# Runs the Creative Monk API + Caddy (auto-HTTPS) on a single VM.
# From this directory:  docker compose up -d --build
services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env # backend secrets (Turso, Cloudinary, JWT, admin)
    environment:
      - PORT=4000
      - NODE_ENV=production
    expose:
      - "4000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - API_DOMAIN=${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
